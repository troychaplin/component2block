name: Build & Test

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: rm -rf node_modules package-lock.json
      - run: npm install

      - run: npm run build

      - run: npm test -- --run
